<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в аккаунт</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Шапка сайта -->
    <header>
        <div>
            <a href="index.html">Опросник</a>
            <button onclick="location.href='index.html'">На главную</button>
        </div>
    </header>

    <!-- Тело сайта -->
    <main class="auth-container">
        <form class="auth-form" action="#" method="post">
            <h1 class="auth-title">Вход</h1>
            
            <div class="auth-field">
                <label class="auth-label" for="login">Логин</label>
                <input class="auth-input" type="text" id="login" name="login" required>
            </div>
            
            <div class="auth-field">
                <label class="auth-label" for="password">Пароль</label>
                <input class="auth-input" type="password" id="password" name="password" required>
            </div>
            
            <button class="auth-button" type="submit">Войти</button>
        </form>
    </main>

    <!-- Подвал сайта -->
    <footer>
        <p>LADA SPIRT</p>
    </footer>
</body>
</html>
