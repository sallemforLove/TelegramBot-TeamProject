<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создать профиль</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'main/css/styles.css' %}">
</head>
<body>

    <header>
        <div>
            <a href="{% url 'index' %}">Опросник</a>
            <button onclick="location.href='{% url 'index' %}'">На главную</button>
        </div>
    </header>

    <main class="auth-container">
        <form method="post" class="auth-form">
    {% csrf_token %}
    <h1 class="auth-title">Создание доступа</h1>

    {% if error %}
        <p style="color:red">{{ error }}</p>
    {% endif %}

    <div class="auth-field">
        <label class="auth-label" for="tg_id">Telegram ID</label>
        <input class="auth-input" type="number" name="tg_id" id="tg_id" required>
    </div>

    <div class="auth-field">
        <label class="auth-label" for="first_name">Имя</label>
        <input class="auth-input" type="text" name="first_name" id="first_name">
    </div>

    <div class="auth-field">
        <label class="auth-label" for="last_name">Фамилия</label>
        <input class="auth-input" type="text" name="last_name" id="last_name">
    </div>

    <div class="auth-field">
        <label class="auth-label" for="age">Возраст</label>
        <input class="auth-input" type="number" name="age" id="age">
    </div>

    <button class="auth-button" type="submit">Выдать доступ</button>
</form>
    </main>


    <footer>
        <p>LADA SPIRT</p>
    </footer>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="{% static 'main/js/telegram_init.js' %}"></script>
</body>
</html>
