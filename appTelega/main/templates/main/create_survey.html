<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать опрос</title>
</head>
<body>
    <h1>Создать новый опрос</h1>

    <!-- Форма для создания нового опроса -->
    <form method="POST">
        {% csrf_token %}
        {{ survey_form.as_p }}
        <button type="submit">Создать опрос</button>
    </form>
    <a href="{% url 'dashboard' %}">← Вернуться на главную</a>

    <!-- Если опрос уже создан, показываем связанные вопросы -->
    {% if questions %}
        <h2>Существующие вопросы:</h2>
        <ul>
            {% for question in questions %}
                <li>{{ question.text }}</li>
            {% empty %}
                <li>Нет вопросов для этого опроса.</li>
            {% endfor %}
        </ul>
    {% endif %}
</body>
</html>
