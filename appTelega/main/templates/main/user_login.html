<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в аккаунт</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'main/css/styles.css' %}">
</head>
<body>
    <header>
        <div>
            <a href="index.html">Опросник</a>
            <button onclick="location.href='index.html'">На главную</button>
        </div>
    </header>

    <main class="auth-container">
        <form method="post">
            {% csrf_token %}
            <h1 class="auth-title">Вход</h1>

            <div class="auth-field">
                <label class="auth-label" for="username">Логин</label>
                <input class="auth-input" type="text" name="username" required>
            </div>

            <div class="auth-field">
                <label class="auth-label" for="password">Пароль</label>
                <input class="auth-input" type="password" name="password" required>
            </div>

            <button class="auth-button" type="submit">Войти</button>
        </form>
    </main>

    <footer>
        <p>LADA SPIRT</p>
    </footer>
</body>
</html>
