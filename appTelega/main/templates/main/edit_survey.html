<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактировать опрос</title>
</head>
<body>
    <h1>Редактировать опрос: "{{ survey.title }}"</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сохранить изменения</button>
    </form>

    <a href="{% url 'create_question' survey.id %}">Вернуться к вопросам</a>
</body>
</html>
