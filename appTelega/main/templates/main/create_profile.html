<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создать профиль</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'main/css/styles.css' %}">
</head>
<body>

    <header>
        <div>
            <a href="{% url 'index' %}">Опросник</a>
            <button onclick="location.href='{% url 'index' %}'">На главную</button>
        </div>
    </header>

    <main class="auth-container">
        <form method="post" class="auth-form">
            {% csrf_token %}
            <h1 class="auth-title">Создание профиля</h1>

            {% if error %}
                <p style="color:red; text-align:center;">{{ error }}</p>
            {% endif %}

            <div class="auth-field">
                <label class="auth-label" for="username">Логин</label>
                <input class="auth-input" type="text" name="username" id="username" required>
            </div>

            <div class="auth-field">
                <label class="auth-label" for="password">Пароль</label>
                <input class="auth-input" type="password" name="password" id="password" required>
            </div>

            <div class="auth-field">
                <label class="auth-label" for="role">Роль</label>
                <select class="auth-input" name="role" id="role" required>
                    <option value="">-- выберите --</option>
                    <option value="Ведущий">Ведущий</option>
                    <option value="Администратор">Администратор</option>
                </select>
            </div>

            <button class="auth-button" type="submit">Создать профиль</button>
        </form>
    </main>


    <footer>
        <p>LADA SPIRT</p>
    </footer>
</body>
</html>
